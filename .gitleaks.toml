# gitleaks configuration for LogicN (#149 — CI secret-scan).
#
# The repo is PUBLIC. This scan guards against a real credential being committed (the original P0 was the
# rotated-but-leaked signing key `8eecf4…`). It extends gitleaks' default rule set and allowlists ONLY
# provably-benign matches — never a real secret. Run in CI via .github/workflows/secret-scan.yml; locally:
#   gitleaks detect --config .gitleaks.toml --redact -v
title = "LogicN secret-scan"

[extend]
useDefault = true   # start from gitleaks' built-in rule pack (AWS/GCP/private-keys/tokens/…)

[allowlist]
description = "Provably-benign matches — test fixtures and secret-DETECTION patterns, never a live secret."
paths = [
  # Self-signed TEST cert/key pairs for the api-server mutual-TLS e2e handshake. Generated by
  # tests/fixtures/tls/gen-certs.sh; ephemeral, scoped to the test, never a production credential.
  '''packages-logicn/logicn-framework-api-server/tests/fixtures/tls/.*''',
  # Any other test-fixture credentials (REJECT-case corpora, mock tokens).
  '''.*/tests/fixtures/.*''',
  '''.*/__fixtures__/.*''',
]
# NOTE: the core-security package DEFINES secret-detection regexes (it FINDS private keys, it doesn't hold
# one). gitleaks' default private-key rule requires actual base64 key ENTROPY between the PEM headers, which
# a detector pattern (`…PRIVATE KEY----- [\s\S]*? -----END…`) has none of — so it does not trip. If a future
# gitleaks version flags it, add an inline `# gitleaks:allow` on that source line (precise, not a blunt path).
#
# NOTE (owner-gated remediation, NOT allowlisted): if the scan flags the legacy signing key `8eecf4…` in
# history, that is the KNOWN P0 — its remediation is re-signing affected artifacts with the rotated key
# (offline custody, gated on #34) + a history rewrite. It is deliberately NOT allowlisted here, so the
# finding stays visible until remediated. The key is already in governance/revocations (evaluates to Deny).
